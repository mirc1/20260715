<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강의 링크</title>

<style>
body{
    margin:0;
    font-family: "맑은 고딕", sans-serif;
    background:#f4f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:600px;
    max-width:90%;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
    text-align:center;
}

h1{
    margin-top:0;
    color:#2c3e50;
}

.linkBox{
    margin:30px 0;
    padding:15px;
    background:#eef5ff;
    border-radius:10px;
    word-break:break-all;
    font-size:20px;
    user-select:all;
}

button{
    font-size:22px;
    padding:15px 40px;
    border:none;
    border-radius:10px;
    background:#0078ff;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#005fd1;
}

#msg{
    margin-top:20px;
    color:green;
    font-size:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<h1>오늘의 강의 링크</h1>

<div class="linkBox" id="link">
https://kimju1416.github.io/edu1
</div>

<button onclick="copyLink()">📋 링크 복사</button>

<div id="msg"></div>

</div>

<script>

function copyLink(){

const text="https://kimju1416.github.io/edu1";

navigator.clipboard.writeText(text).then(()=>{
    document.getElementById("msg").innerHTML="✅ 링크가 복사되었습니다!";
}).catch(()=>{
    prompt("복사(Ctrl+C) 후 Enter를 누르세요.",text);
});

}

</script>

</body>
</html>
